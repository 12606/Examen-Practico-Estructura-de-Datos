<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Algoritmos sobre Grafos</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<div class="container">

    <header>
        <h1>Algoritmos sobre Grafos</h1>
        <p>
            Aplicación web con Spring Boot para ejecutar DFS, BFS,
            profundidad limitada, profundidad iterativa, A*, Kruskal y Prim.
        </p>
    </header>

    <section class="panel">

        <div class="form-group">
            <label for="algorithm">Seleccione el algoritmo:</label>
            <select id="algorithm">
                <option value="/api/dfs">DFS - Búsqueda en profundidad</option>
                <option value="/api/bfs">BFS - Búsqueda en amplitud</option>
                <option value="/api/depth-limited">Profundidad limitada</option>
                <option value="/api/iterative-deepening">Profundidad iterativa</option>
                <option value="/api/a-star">A*</option>
                <option value="/api/kruskal">Kruskal</option>
                <option value="/api/prim">Prim</option>
            </select>
        </div>

        <div class="buttons">
            <button onclick="loadExample()">Cargar ejemplo</button>
            <button onclick="executeAlgorithm()">Ejecutar algoritmo</button>
            <button onclick="clearResult()">Limpiar</button>
        </div>

        <div class="grid">
            <div>
                <h2>JSON de entrada</h2>
                <textarea id="jsonInput"></textarea>
            </div>

            <div>
                <h2>Resultado</h2>
                <pre id="result"></pre>
            </div>
        </div>

        <h2>Visualización básica</h2>
        <canvas id="graphCanvas" width="900" height="420"></canvas>

    </section>

</div>

<script>
    function loadExample() {
        const example = {
            directed: false,
            weighted: true,
            start: "A",
            goal: "E",
            limit: 4,
            heuristic: "EUCLIDEAN",
            nodes: [
                { id: "A", x: 100, y: 200 },
                { id: "B", x: 250, y: 100 },
                { id: "C", x: 250, y: 300 },
                { id: "D", x: 450, y: 180 },
                { id: "E", x: 650, y: 220 }
            ],
            edges: [
                { from: "A", to: "B", weight: 4 },
                { from: "A", to: "C", weight: 2 },
                { from: "B", to: "D", weight: 5 },
                { from: "C", to: "D", weight: 8 },
                { from: "D", to: "E", weight: 3 },
                { from: "B", to: "E", weight: 12 }
            ]
        };

        document.getElementById("jsonInput").value = JSON.stringify(example, null, 2);
        drawGraph(example, null);
    }

    async function executeAlgorithm() {
        const endpoint = document.getElementById("algorithm").value;
        const inputText = document.getElementById("jsonInput").value;
        const resultBox = document.getElementById("result");

        try {
            const graphJson = JSON.parse(inputText);

            const response = await fetch(endpoint, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(graphJson)
            });

            const data = await response.json();

            resultBox.textContent = JSON.stringify(data, null, 2);
            drawGraph(graphJson, data);

        } catch (error) {
            resultBox.textContent = "Error: " + error.message;
        }
    }

    function clearResult() {
        document.getElementById("result").textContent = "";
    }

    function drawGraph(graph, result) {
        const canvas = document.getElementById("graphCanvas");
        const ctx = canvas.getContext("2d");

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!graph || !graph.nodes || !graph.edges) {
            return;
        }

        const nodeMap = {};

        graph.nodes.forEach((node, index) => {
            const x = node.x !== null && node.x !== undefined ? node.x : 100 + index * 100;
            const y = node.y !== null && node.y !== undefined ? node.y : 200;

            nodeMap[node.id] = { x, y };
        });

        const highlightedEdges = new Set();

        if (result && result.resultEdges) {
            result.resultEdges.forEach(edge => {
                highlightedEdges.add(edge.from + "-" + edge.to);
                highlightedEdges.add(edge.to + "-" + edge.from);
            });
        }

        if (result && result.path && result.path.length > 1) {
            for (let i = 0; i < result.path.length - 1; i++) {
                highlightedEdges.add(result.path[i] + "-" + result.path[i + 1]);
                highlightedEdges.add(result.path[i + 1] + "-" + result.path[i]);
            }
        }

        graph.edges.forEach(edge => {
            const from = nodeMap[edge.from];
            const to = nodeMap[edge.to];

            if (!from || !to) {
                return;
            }

            const key = edge.from + "-" + edge.to;

            ctx.beginPath();
            ctx.moveTo(from.x, from.y);
            ctx.lineTo(to.x, to.y);

            if (highlightedEdges.has(key)) {
                ctx.strokeStyle = "#2ecc71";
                ctx.lineWidth = 4;
            } else {
                ctx.strokeStyle = "#888";
                ctx.lineWidth = 2;
            }

            ctx.stroke();

            const midX = (from.x + to.x) / 2;
            const midY = (from.y + to.y) / 2;

            ctx.fillStyle = "#222";
            ctx.font = "14px Arial";
            ctx.fillText(edge.weight ?? 1, midX, midY);
        });

        graph.nodes.forEach(node => {
            const position = nodeMap[node.id];

            ctx.beginPath();
            ctx.arc(position.x, position.y, 22, 0, Math.PI * 2);
            ctx.fillStyle = "#1f6feb";
            ctx.fill();
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 15px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(node.id, position.x, position.y);
        });
    }

    loadExample();
</script>

</body>
</html>
